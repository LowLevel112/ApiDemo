$kind: http-request
name: POST Login
method: POST
url: '{{baseUrl}}/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "{{loginUsername}}",
      "password": "{{loginPassword}}",
      "expiresInMins": 30
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test("Content-Type includes application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });
      pm.test("Response has accessToken string property (not empty)", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("accessToken").that.is.a("string").and.not.empty;
      });
      var jsonData = pm.response.json();
      pm.environment.set("authToken", jsonData.accessToken);
